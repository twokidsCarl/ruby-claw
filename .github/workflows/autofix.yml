name: Auto Fix Issue

on:
  issues:
    types: [opened, labeled]

jobs:
  autofix:
    if: contains(github.event.issue.labels.*.name, 'autofix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code to fix issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          BRANCH_NAME="autofix/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH_NAME"

          claude -p "You are fixing a GitHub issue for a Ruby gem project.

          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Instructions:
          1. Understand the issue
          2. Find the relevant code
          3. Implement the fix
          4. Add or update tests to cover the fix
          5. Run 'bundle exec rspec' to verify all tests pass
          6. Do NOT commit — just make the file changes" --allowedTools "Bash,Read,Write,Edit,Glob,Grep"

          # Check if any files changed
          if git diff --quiet; then
            echo "No changes made"
            gh issue comment "$ISSUE_NUMBER" --body "🤖 Auto-fix attempted but no code changes were needed. Manual review required."
            exit 0
          fi

          git add -A
          git commit -m "$(cat <<EOF
          fix: auto-fix issue #${ISSUE_NUMBER}

          ${ISSUE_TITLE}

          Closes #${ISSUE_NUMBER}
          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "fix: auto-fix #${ISSUE_NUMBER} — ${ISSUE_TITLE}" \
            --body "$(cat <<EOF
          ## Summary
          Automated fix for #${ISSUE_NUMBER}.

          ## Changes
          $(git diff HEAD~1 --stat)

          ## Test
          - [ ] CI passes (Ruby 3.3, 3.4, 4.0)
          - [ ] CodeRabbit review approved

          Closes #${ISSUE_NUMBER}

          🤖 Generated by Auto Fix workflow
          EOF
          )" \
            --label "autofix"

          gh issue comment "$ISSUE_NUMBER" --body "🤖 Auto-fix PR created. Waiting for CI + CodeRabbit review."
